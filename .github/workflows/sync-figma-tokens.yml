name: Sync Figma Tokens

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering
  repository_dispatch:
    types: [figma-token-sync]

jobs:
  sync-tokens:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Sync tokens from Figma
        env:
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
        run: npm run sync:tokens
      
      - name: Generate SCSS token files
        run: npm run generate:tokens
      
      - name: Check for changes
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "diff<<EOF" >> $GITHUB_OUTPUT
            git diff --stat >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Pull Request
        if: steps.check-changes.outputs.changes == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/figma-token-sync
          delete-branch: true
          title: "chore: sync design tokens from Figma"
          body: |
            ## Automated Token Sync

            Design tokens were updated in Figma and detected by the daily sync.

            ### Changed Files
            ```
            ${{ steps.check-changes.outputs.diff }}
            ```

            ### Source
            - **Figma file**: `${{ secrets.FIGMA_FILE_KEY }}`
            - **Trigger**: ${{ github.event_name == 'repository_dispatch' && 'Figma library poll' || github.event_name == 'workflow_dispatch' && 'Manual trigger' || 'Daily schedule' }}

            ---
            *Auto-generated by [Sync Figma Tokens](.github/workflows/sync-figma-tokens.yml)*
          commit-message: "chore: sync design tokens from Figma"
          add-paths: |
            design-system/src/tokens/*.scss
            new tokens/

      - name: Notify Slack — Token changes detected
        if: steps.check-changes.outputs.changes == 'true' && steps.create-pr.outputs.pull-request-url
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          node scripts/notify-slack.js \
            --type=token-sync \
            --changes="${{ steps.check-changes.outputs.diff }}" \
            --pr-url="${{ steps.create-pr.outputs.pull-request-url }}" \
            --pr-title="chore: sync design tokens from Figma"
        continue-on-error: true

      - name: Notify Slack — No changes
        if: steps.check-changes.outputs.changes == 'false'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          node scripts/notify-slack.js --type=no-changes
        continue-on-error: true

      - name: Report status
        if: steps.check-changes.outputs.changes == 'false'
        run: echo "✅ No token changes detected"



