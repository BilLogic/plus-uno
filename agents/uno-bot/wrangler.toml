# Slack login for slack_search. slack_search calls Slack's search Web API, which
# rejects bot tokens, so it needs a USER token issued via a one-time OAuth
# consent (/oauth/slack/start). Slack has NO dynamic registration → a STATIC
# pre-registered client is used: the client_id is non-secret (here); the
# client_secret is a wrangler secret (SLACK_MCP_CLIENT_SECRET). The redirect URI
# must match the one registered on the Slack app.
SLACK_MCP_CLIENT_ID = "12186538800.10808020289637"
SLACK_OAUTH_REDIRECT_URI = "https://uno-bot.bryanhuang628.workers.dev/oauth/slack/callback"
