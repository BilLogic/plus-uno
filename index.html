<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLUS Design System - Starter Template</title>
    
    <!-- Bootstrap 4 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PLUS Design System CSS -->
    <link rel="stylesheet" href="dist/css/main.css">
</head>
<body>
    <div class="container-fluid padding-4">
        <header class="component-margin-btm-4">
            <h1 class="h1">PLUS Design System</h1>
            <p class="body1-txt color-neutral">Starter template for prototyping with PLUS design system</p>
        </header>

        <main>
            <section class="component-margin-btm-4">
                <h2 class="h2 component-margin-btm-2">Buttons</h2>
                <div class="d-flex gap-between-components-2 flex-wrap">
                    <div id="button-examples"></div>
                </div>
            </section>

            <section class="component-margin-btm-4">
                <h2 class="h2 component-margin-btm-2">Form Elements</h2>
                <div id="form-examples"></div>
            </section>

            <section class="component-margin-btm-4">
                <h2 class="h2 component-margin-btm-2">SMART Components</h2>
                <div id="smart-examples"></div>
            </section>
        </main>
    </div>

    <!-- Connection Error Handler -->
    <script type="module">
        // Handle connection errors for CDN resources
        import { PlusUtil } from './src/js/utils/plus_util.js';
        
        /**
         * Checks if a resource loaded successfully
         * @param {string} url - Resource URL to check
         * @returns {Promise<boolean>} True if resource loaded, false otherwise
         */
        async function checkResourceLoaded(url) {
            try {
                const response = await fetch(url, { method: 'HEAD', mode: 'no-cors' });
                return true;
            } catch (e) {
                return false;
            }
        }
        
        /**
         * Verifies critical CDN resources loaded
         */
        async function verifyResources() {
            const criticalResources = [
                'https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css',
                'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css',
                'https://code.jquery.com/jquery-3.6.0.min.js'
            ];
            
            // Check if jQuery loaded (most reliable check)
            if (typeof window.jQuery === 'undefined') {
                setTimeout(() => {
                    if (typeof window.jQuery === 'undefined') {
                        PlusUtil.handleConnectionError();
                    }
                }, 3000);
            }
            
            // Check if Bootstrap loaded (check for Bootstrap classes)
            setTimeout(() => {
                const testEl = document.createElement('div');
                testEl.className = 'container';
                const styles = window.getComputedStyle(testEl);
                // If Bootstrap didn't load, display will be inline instead of block
                if (styles.display === 'inline') {
                    PlusUtil.handleConnectionError();
                }
            }, 2000);
        }
        
        // Check for connection errors after page loads
        window.addEventListener('load', () => {
            verifyResources();
            
            // Check for failed script loads
            const scripts = document.querySelectorAll('script[src]');
            scripts.forEach(script => {
                script.addEventListener('error', () => {
                    PlusUtil.handleResourceLoadError(script.src, 'script');
                });
            });
        });
        
        // Handle unhandled promise rejections (often network errors)
        window.addEventListener('unhandledrejection', (event) => {
            const error = event.reason;
            // Check if it's a network/connection error
            if (error && (
                error.message && (
                    error.message.includes('Failed to fetch') ||
                    error.message.includes('NetworkError') ||
                    error.message.includes('Load failed') ||
                    error.message.includes('connection')
                ) ||
                error.name === 'TypeError' ||
                error.name === 'NetworkError'
            )) {
                event.preventDefault(); // Prevent default error logging
                PlusUtil.handleConnectionError();
            }
        });
        
        // Handle fetch errors globally
        const originalFetch = window.fetch;
        window.fetch = async function(...args) {
            try {
                return await originalFetch.apply(this, args);
            } catch (error) {
                // Check if it's a network error
                if (error.message && (
                    error.message.includes('Failed to fetch') ||
                    error.message.includes('NetworkError') ||
                    error.message.includes('Load failed')
                )) {
                    PlusUtil.handleConnectionError();
                }
                throw error;
            }
        };
        
        // Handle online/offline events
        window.addEventListener('online', () => {
            const errorAlert = document.getElementById('plus-connection-error');
            if (errorAlert) {
                errorAlert.remove();
            }
        });
        
        window.addEventListener('offline', () => {
            PlusUtil.handleConnectionError();
        });
    </script>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Bootstrap 4 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- PLUS Components -->
    <script type="module" src="src/js/main.js"></script>
</body>
</html>
