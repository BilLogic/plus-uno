<style>
  /* Hide icons only for group/component nodes (main component dropdowns like "Alert")
     Keep icons for leaf nodes (stories/docs like "Docs", "Overview", "Interactive")
  */
  
  /* Target group nodes: expandable buttons that are NOT leaf stories
     Storybook structure: group nodes are buttons with data-nodetype="group"
     Leaf nodes are anchors (a) or buttons with data-nodetype="story"/"document"
  */
  .sidebar-container button[data-nodetype="group"] svg,
  .sidebar-container button[data-nodetype="group"] [class*="TypeIcon"],
  .sidebar-container button[data-nodetype="group"] [class*="TypeIcon"] svg {
    display: none !important;
    width: 0 !important;
    height: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
  }
  
  /* Hide icon wrapper containers for group nodes only */
  .sidebar-container button[data-nodetype="group"] [class*="Wrapper"] {
    display: none !important;
    width: 0 !important;
    min-width: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
    flex: 0 0 0 !important;
  }
  
  /* Remove gap from flex containers for group nodes */
  .sidebar-container button[data-nodetype="group"] {
    gap: 0 !important;
  }
  
  /* Leaf nodes (stories/docs) keep their icons - explicitly allow them */
  .sidebar-container a[data-nodetype="story"] svg,
  .sidebar-container a[data-nodetype="document"] svg,
  .sidebar-container button[data-nodetype="story"] svg,
  .sidebar-container button[data-nodetype="document"] svg {
    display: revert !important;
    width: revert !important;
    height: revert !important;
  }
</style>

<script>
  // Hide icons for group nodes only, keep icons for leaf nodes
  function hideGroupNodeIcons() {
    const sidebar = document.querySelector('.sidebar-container');
    if (!sidebar) return;
    
    // Find group nodes (expandable component dropdowns)
    const groupNodes = sidebar.querySelectorAll('button[data-nodetype="group"]');
    
    groupNodes.forEach(item => {
      // Hide all icons within group nodes
      const icons = item.querySelectorAll('svg, [class*="TypeIcon"], [class*="Wrapper"]');
      icons.forEach(icon => {
        icon.style.display = 'none';
        icon.style.width = '0';
        icon.style.height = '0';
        icon.style.margin = '0';
        icon.style.padding = '0';
      });
      
      // Hide wrapper containers
      const wrappers = item.querySelectorAll('[class*="Wrapper"]');
      wrappers.forEach(wrapper => {
        wrapper.style.display = 'none';
        wrapper.style.width = '0';
        wrapper.style.minWidth = '0';
        wrapper.style.margin = '0';
        wrapper.style.padding = '0';
        wrapper.style.flex = '0 0 0';
      });
    });
    
    // Ensure leaf nodes keep their icons visible
    const leafNodes = sidebar.querySelectorAll('a[data-nodetype="story"], a[data-nodetype="document"], button[data-nodetype="story"], button[data-nodetype="document"]');
    leafNodes.forEach(item => {
      const icons = item.querySelectorAll('svg, [class*="TypeIcon"]');
      icons.forEach(icon => {
        icon.style.display = '';
        icon.style.width = '';
        icon.style.height = '';
      });
    });
  }
  
  // Run on load and when sidebar updates
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', hideGroupNodeIcons);
  } else {
    hideGroupNodeIcons();
  }
  
  // Also run after a short delay to catch dynamically loaded content
  setTimeout(hideGroupNodeIcons, 500);
  
  // Watch for sidebar updates
  const observer = new MutationObserver(() => {
    hideGroupNodeIcons();
  });
  
  // Observe sidebar container for changes
  const sidebarContainer = document.querySelector('.sidebar-container');
  if (sidebarContainer) {
    observer.observe(sidebarContainer, {
      childList: true,
      subtree: true,
      attributes: true,
      attributeFilter: ['style', 'data-nodetype']
    });
  }
</script>
