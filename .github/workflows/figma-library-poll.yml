name: Poll Figma Library

on:
  schedule:
    # Every 15 minutes during work hours (Mon-Fri, 9am-7pm UTC)
    - cron: '*/15 13-23 * * 1-5'
  workflow_dispatch:
    # Allow manual triggering
  repository_dispatch:
    types: [figma-library-publish]
    # Triggered by Slack Workflow Builder when Figma app posts a publish notification

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  poll-library:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Poll Figma for changes
        id: poll
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node scripts/poll-figma-library.js

      - name: Commit updated snapshot
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add scripts/figma-component-snapshot.json
          git diff --cached --quiet || git commit -m "chore: update Figma component snapshot [skip ci]"
          git push || true

      - name: Create ds-review branch and draft PR
        if: steps.poll.outputs.components_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changeSummary = JSON.parse('${{ steps.poll.outputs.change_summary }}');
            const names = [
              ...changeSummary.created,
              ...changeSummary.modified,
              ...changeSummary.deleted
            ].join(', ');

            // Build branch name from first component
            const slug = names.split(',')[0].trim().toLowerCase().replace(/[^a-z0-9]+/g, '-');
            const date = new Date().toISOString().slice(0, 10);
            const branchName = `ds-review/${slug}-${date}`;

            let body = '';
            try {
              body = fs.readFileSync('.figma-sync-context/issue-body.md', 'utf8');
            } catch {
              body = `Figma component changes detected: ${names}`;
            }

            const reviewChecklist = [
              '',
              '---',
              '## DS Review Checklist',
              '',
              '- [ ] Component code updated to match Figma',
              '- [ ] Storybook stories updated',
              '- [ ] Visual parity verified against Figma',
              '- [ ] No regressions in existing components',
              '- [ ] DS manager approved',
            ].join('\n');

            // Check for existing open PR to avoid duplicates
            const existingPRs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:ds-review/`
            });
            const alreadyExists = existingPRs.data.some(
              pr => pr.title.includes('Figma DS update')
            );

            if (alreadyExists) {
              console.log('Open ds-review PR already exists — skipping');
              return;
            }

            // Get main branch SHA
            const mainRef = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main'
            });

            // Create branch from main
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branchName}`,
              sha: mainRef.data.object.sha
            });
            console.log(`Branch created: ${branchName}`);

            // Create draft PR
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `feat: Figma DS update — ${names}`,
              head: branchName,
              base: 'main',
              body: body + reviewChecklist,
              draft: true
            });
            console.log(`Draft PR created: #${pr.data.number}`);

            // Add labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: ['design-system', 'figma-sync']
            });

