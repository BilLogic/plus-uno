<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - PLUS Personalized Learning</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600;700&family=Merriweather+Sans:wght@300;400;600;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 4 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css">
    
    <!-- PLUS Design System CSS -->
    <link rel="stylesheet" href="../../dist/css/main.css">
    
    <style>
        /**
         * Sign-In Portal Page Styles
         * Following PLUS Design System guidelines and Figma design specs
         * Reference: design-system/styles/ and design-system/components/overview.md
         */
        
        /* Page Container - Surface Layer */
        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-surface-container);
            color: var(--color-on-surface);
            font-family: var(--font-family-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* Main Container - Surface Container */
        .sign-in-main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--size-surface-gap-lg);
            width: 100%;
            padding: var(--size-surface-pad-x) var(--size-surface-pad-y);
            min-height: 100vh;
        }
        
        /* Logo Container - Section Layer */
        .sign-in-logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--size-section-gap-md);
            padding: var(--size-section-pad-y-sm);
            border-radius: var(--size-section-radius-sm);
        }
        
        .sign-in-logo-icon {
            width: 64px;
            height: 64px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--color-surface-container-low);
            border-radius: var(--size-card-radius-sm);
        }
        
        .sign-in-logo-text {
            height: 64px;
            width: 172.308px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--color-surface-container-low);
            border-radius: var(--size-card-radius-sm);
        }
        
        /* Login Card - Card Layer */
        .sign-in-card {
            background-color: var(--color-surface-container-lowest);
            border-radius: var(--size-card-radius-md);
            box-shadow: 0px 4px 8px 3px rgba(0, 0, 0, 0.15), 0px 1px 3px 0px rgba(0, 0, 0, 0.3);
            padding: var(--size-card-pad-x-lg) var(--size-card-pad-y-lg);
            width: 100%;
            max-width: 558.67px;
            display: flex;
            flex-direction: column;
            gap: var(--size-card-gap-lg);
        }
        
        /* Login Content - Element Layer */
        .sign-in-content {
            display: flex;
            flex-direction: column;
            gap: var(--size-element-pad-x-sm);
            width: 100%;
        }
        
        .sign-in-heading {
            font-family: var(--font-family-header);
            font-weight: var(--font-weight-bold);
            font-size: 40px;
            line-height: 1.6;
            color: var(--color-on-surface);
            margin: 0;
        }
        
        .sign-in-subtitle {
            font-family: var(--font-family-body);
            font-weight: var(--font-weight-normal);
            font-size: 16px;
            line-height: 1.5;
            color: var(--color-on-surface);
            margin: 0;
        }
        
        /* Button Container - Element Layer */
        .sign-in-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--size-element-gap-lg);
            width: 100%;
        }
        
        /* Google Button Custom Styling - Outline with border */
        .sign-in-google-btn {
            border: var(--size-element-border) solid var(--color-primary) !important;
            background-color: transparent !important;
            color: var(--color-on-surface) !important;
        }
        
        .sign-in-google-btn .pbtn-content {
            display: flex;
            align-items: center;
            gap: var(--size-element-gap-md);
            color: var(--color-on-surface) !important;
        }
        
        .sign-in-google-btn .pbtn-content span {
            color: var(--color-on-surface) !important;
        }
        
        .sign-in-google-btn .google-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }
        
        /* Clever Button Custom Styling - Filled blue */
        .sign-in-clever-btn {
            background-color: #2e76ff !important;
            border: none !important;
            height: 40px;
        }
        
        .sign-in-clever-btn .pbtn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff !important;
            padding: 0;
        }
        
        .sign-in-clever-btn .clever-image {
            width: 200px;
            height: 44px;
            object-fit: contain;
        }
        
        .sign-in-clever-btn:hover .pbtn-state-screen {
            background-color: color-mix(in srgb, #2e76ff 92%, black) !important;
        }
        
        /* Divider Container - Element Layer */
        .sign-in-divider-container {
            display: flex;
            align-items: center;
            gap: var(--size-element-gap-lg);
            width: 100%;
        }
        
        .sign-in-divider-line {
            flex: 1 0 0;
            height: 1px;
            background-color: var(--color-outline-variant);
        }
        
        .sign-in-divider-text {
            font-family: var(--font-family-body);
            font-weight: var(--font-weight-normal);
            font-size: 16px;
            line-height: 1.5;
            color: var(--color-on-surface);
            white-space: nowrap;
        }
        
        /* Demo Button Container */
        .sign-in-demo-container {
            display: flex;
            width: 100%;
        }
        
        /* Footer - Section Layer */
        .sign-in-footer {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        
        .sign-in-footer-text {
            font-family: var(--font-family-body);
            font-weight: var(--font-weight-normal);
            font-size: 16px;
            line-height: 1.5;
            color: var(--color-on-surface);
            text-align: center;
            margin: 0;
        }
        
        .sign-in-footer-link {
            font-family: var(--font-family-body);
            font-weight: var(--font-weight-bold);
            color: var(--color-primary);
            text-decoration: underline;
            text-underline-position: from-font;
        }
        
        .sign-in-footer-link:hover {
            color: var(--color-primary);
            text-decoration: underline;
        }
        
        /* Alert Component Styling - Match Figma design */
        .sign-in-card .plus-alert {
            width: 100%;
            margin-bottom: 0;
        }
        
        .sign-in-card .plus-alert.warning {
            background-color: var(--color-warning-state-08);
            border-color: var(--color-warning);
            color: var(--color-on-warning-container);
        }
        
        .sign-in-card .plus-alert-dismiss-btn {
            color: var(--color-on-surface-variant);
            font-size: 14px;
        }
        
        .sign-in-card .plus-alert-dismiss-btn:hover {
            color: var(--color-on-surface);
        }
    </style>
</head>
<body>
    <div class="sign-in-main-container">
        <!-- Logo -->
        <div class="sign-in-logo-container">
            <!-- Placeholder for logo icon - please provide logo-container.svg or logo-container.png -->
            <div class="sign-in-logo-icon" title="Logo icon placeholder - please provide logo-container.svg or logo-container.png"></div>
            <!-- Placeholder for logo text - please provide logo-text.svg or logo-text.png -->
            <div class="sign-in-logo-text" title="Logo text placeholder - please provide logo-text.svg or logo-text.png"></div>
        </div>
        
        <!-- Login Card -->
        <div class="sign-in-card" id="sign-in-card">
            <!-- Alert will be inserted here by JavaScript -->
            
            <!-- Login Content -->
            <div class="sign-in-content">
                <h1 class="sign-in-heading">Login</h1>
                <p class="sign-in-subtitle">Double Math Learning with PLUS.</p>
            </div>
            
            <!-- Login Buttons -->
            <div class="sign-in-buttons" id="sign-in-buttons">
                <!-- Buttons will be inserted here by JavaScript -->
            </div>
            
            <!-- Divider -->
            <div class="sign-in-divider-container">
                <div class="sign-in-divider-line"></div>
                <span class="sign-in-divider-text">or</span>
                <div class="sign-in-divider-line"></div>
            </div>
            
            <!-- Try Demo Button -->
            <div class="sign-in-demo-container" id="sign-in-demo-container">
                <!-- Button will be inserted here by JavaScript -->
            </div>
        </div>
        
        <!-- Footer -->
        <footer class="sign-in-footer">
            <p class="sign-in-footer-text">
                Need help? <a href="#" class="sign-in-footer-link">Contact us</a>.
            </p>
        </footer>
    </div>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Bootstrap 4 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.js"></script>
    
    <!-- PLUS Components -->
    <script type="module" src="sign-in-portal.js"></script>
</body>
</html>
