<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-in Portal - PLUS Design System</title>
    
    <!-- Google Fonts -->
    <!-- CRITICAL: Fonts must be loaded before CSS to ensure design tokens work correctly -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600;700&family=Merriweather+Sans:wght@300;400;600;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 4.6.2 CSS -->
    <!-- MUST use version 4.6.2 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <!-- For icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PLUS Design System CSS -->
    <!-- From playground/prototyping/{designer}/{prototype}/: 4 levels up to root -->
    <link rel="stylesheet" href="../../../../dist/css/main.css">
    
    <style>
        /**
         * Sign-in Portal Page Styles
         * Following PLUS Design System guidelines and Figma design
         * Figma Reference: https://www.figma.com/design/W0qzhXWxFsMwSJzkdV2yal/Design-System---Web-App-Specs?node-id=115-5206
         */
        
        /* Page Container - Surface */
        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-surface-container);
            color: var(--color-on-surface);
            font-family: var(--font-family-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* Main Container - Surface Container */
        .sign-in-main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--size-surface-gap-lg);
            width: 100%;
            padding: var(--size-surface-pad-x) var(--size-surface-pad-y);
        }
        
        /* Logo Container */
        .sign-in-logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--size-spacing-medium-space-300);
            padding: var(--size-spacing-medium-space-200);
            border-radius: 1.778px;
        }
        
        /* Login Card - Card Layer */
        .sign-in-card {
            background-color: var(--color-surface-container-lowest);
            border-radius: var(--size-card-radius-lg);
            box-shadow: var(--elevation-light-3);
            padding: var(--size-card-pad-x-lg) var(--size-card-pad-y-lg);
            display: flex;
            flex-direction: column;
            gap: var(--size-card-gap-lg);
            width: 100%;
            max-width: 558.67px;
        }
        
        /* Paragraph Container - Element Layer */
        .sign-in-paragraph-container {
            display: flex;
            flex-direction: column;
            gap: var(--size-element-pad-x-sm);
            width: 100%;
        }
        
        /* Login Heading - H1 (Lato Bold, 40px, line-height 1.6) */
        .sign-in-heading {
            font-family: var(--font-family-header);
            font-weight: var(--font-weight-bold);
            font-size: 40px;
            line-height: 1.6;
            color: var(--color-on-surface);
            margin: 0;
            width: 100%;
        }
        
        /* Subtitle - Body/B1 (Merriweather Sans Light, 16px, line-height 1.5) */
        .sign-in-subtitle {
            font-family: var(--font-family-body);
            font-weight: var(--font-weight-normal);
            font-size: 16px;
            line-height: 1.5;
            color: var(--color-on-surface);
            margin: 0;
            width: 100%;
        }
        
        /* Auth Buttons Container - Element Layer */
        .sign-in-auth-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--size-element-gap-lg);
            width: 100%;
        }
        
        /* Google Button Custom Styling - Outline with border */
        .sign-in-google-btn {
            border: var(--size-element-border) solid var(--color-primary) !important;
            background-color: transparent !important;
            color: var(--color-on-surface) !important;
            width: 100%;
        }
        
        .sign-in-google-btn .pbtn-content {
            display: flex;
            align-items: center;
            gap: var(--size-element-gap-md);
            color: var(--color-on-surface) !important;
        }
        
        .sign-in-google-btn .pbtn-content span {
            color: var(--color-on-surface) !important;
        }
        
        .sign-in-google-btn .google-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }
        
        /* Clever Button Custom Styling - Filled blue #2e76ff */
        .sign-in-clever-btn {
            background-color: #2e76ff !important;
            border: none !important;
            height: 40px;
            width: 100%;
        }
        
        .sign-in-clever-btn .pbtn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff !important;
            padding: 0;
        }
        
        .sign-in-clever-btn .clever-image {
            width: 200px;
            height: 44px;
            object-fit: contain;
        }
        
        .sign-in-clever-btn:hover .pbtn-state-screen {
            background-color: color-mix(in srgb, #2e76ff 92%, black) !important;
        }
        
        /* Divider Container - Element Layer */
        .sign-in-divider-container {
            display: flex;
            align-items: center;
            gap: var(--size-element-gap-lg);
            width: 100%;
        }
        
        .sign-in-divider-line {
            flex: 1 0 0;
            height: 1px;
            background-color: var(--color-outline-variant);
        }
        
        .sign-in-divider-text {
            font-family: var(--font-family-body);
            font-weight: var(--font-weight-normal);
            font-size: 16px;
            line-height: 1.5;
            color: var(--color-on-surface);
            white-space: nowrap;
        }
        
        /* Try a demo Button - Secondary/Tonal */
        .sign-in-demo-btn {
            width: 100%;
        }
        
        /* Footer */
        .sign-in-footer {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        
        .sign-in-footer-text {
            font-family: var(--font-family-body);
            font-weight: var(--font-weight-normal);
            font-size: 16px;
            line-height: 1.5;
            color: var(--color-on-surface);
            text-align: center;
        }
        
        .sign-in-footer-link {
            font-family: var(--font-family-body);
            font-weight: var(--font-weight-bold);
            color: #0472a8;
            text-decoration: underline;
            text-underline-position: from-font;
        }
        
        .sign-in-footer-link:hover {
            color: #0472a8;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="sign-in-main-container" id="sign-in-main-container">
        <!-- Logo will be inserted here by JavaScript -->
        
        <!-- Login Card -->
        <div class="sign-in-card" id="sign-in-card">
            <!-- Paragraph Container -->
            <div class="sign-in-paragraph-container">
                <h1 class="sign-in-heading">Login</h1>
                <p class="sign-in-subtitle">Double Math Learning with PLUS.</p>
            </div>
            
            <!-- Auth Buttons Container -->
            <div class="sign-in-auth-buttons" id="sign-in-auth-buttons">
                <!-- Google and Clever buttons will be inserted here -->
            </div>
            
            <!-- Divider -->
            <div class="sign-in-divider-container">
                <div class="sign-in-divider-line"></div>
                <div class="sign-in-divider-text">or</div>
                <div class="sign-in-divider-line"></div>
            </div>
            
            <!-- Try a demo Button Container -->
            <div class="sign-in-demo-btn" id="sign-in-demo-btn">
                <!-- Try a demo button will be inserted here -->
            </div>
        </div>
        
        <!-- Footer -->
        <div class="sign-in-footer">
            <p class="sign-in-footer-text">
                Need help? <a href="#" class="sign-in-footer-link">Contact us</a>.
            </p>
        </div>
    </div>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Bootstrap 4.6.2 JS -->
    <!-- MUST use version 4.6.2 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <!-- From playground/prototyping/{designer}/{prototype}/: 4 levels up to root -->
    <script type="module" src="script.js"></script>
</body>
</html>
