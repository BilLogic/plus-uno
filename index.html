<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLUS Design System - Starter Template</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600;700&family=Merriweather+Sans:wght@300;400;600;700&family=Open+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 4 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- PLUS Design System CSS -->
    <link rel="stylesheet" href="dist/css/main.css">
</head>

<body>
    <div class="container-fluid" style="padding: var(--size-section-pad-y-md) var(--size-section-pad-x-md)">
        <header style="margin-bottom: var(--size-section-gap-lg)">
            <h1 class="h1">PLUS Design System</h1>
            <p class="body1-txt color-neutral">Starter template for prototyping with PLUS design system</p>
        </header>

        <main>
            <section style="margin-bottom: var(--size-section-gap-lg)">
                <h2 class="h2" style="margin-bottom: var(--size-section-gap-md)">Buttons</h2>
                <div class="d-flex flex-wrap" style="gap: var(--size-element-gap-md)">
                    <div id="button-examples"></div>
                </div>
            </section>

            <section style="margin-bottom: var(--size-section-gap-lg)">
                <h2 class="h2" style="margin-bottom: var(--size-section-gap-md)">Form Elements</h2>
                <div id="form-examples"></div>
            </section>

            <section style="margin-bottom: var(--size-section-gap-lg)">
                <h2 class="h2" style="margin-bottom: var(--size-section-gap-md)">SMART Components</h2>
                <div id="smart-examples"></div>
            </section>
        </main>
    </div>

    <!-- PLUS Components -->

    <!-- React Root -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
