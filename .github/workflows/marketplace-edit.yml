name: Marketplace Edit (stub)

# Triggered by uno-bot v2 via repository_dispatch when a designer confirms
# a "marketplace_edit" proposal. Stub — real implementation in v2.x.

on:
  repository_dispatch:
    types: [marketplace-edit]

jobs:
  acknowledge:
    runs-on: ubuntu-latest
    steps:
      - name: Log payload
        run: |
          echo "marketplace-edit dispatch received"
          echo '${{ toJson(github.event.client_payload) }}'

      - name: Post acknowledgment to Slack thread
        if: ${{ github.event.client_payload.channel && github.event.client_payload.thread_ts }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNEL: ${{ github.event.client_payload.channel }}
          THREAD_TS: ${{ github.event.client_payload.thread_ts }}
          ID: ${{ github.event.client_payload.id }}
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -nc --arg c "$CHANNEL" --arg t "$THREAD_TS" --arg id "$ID" '{channel:$c, thread_ts:$t, text:(":construction: Marketplace edit stub fired for prototype " + $id + ". Real workflow coming in v2.x.")}')" || true
