<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* Active story/docs row: PLUS primary (theme colorPrimary is blue; enforce for sidebar tree) */
  .sidebar-container a[data-selected='true'],
  .sidebar-container button[data-selected='true'] {
    border-radius: 0.375rem;
    background-color: #0472a8 !important;
    color: #ffffff !important;
  }

  .sidebar-container a[data-selected='true'] svg,
  .sidebar-container button[data-selected='true'] svg {
    color: #ffffff !important;
    opacity: 0.95;
  }

  .sidebar-container a[href]:hover,
  .sidebar-container button[role='treeitem']:hover {
    border-radius: 0.25rem;
  }

  /*
   * Remove Storybook TypeIcons (14×14) from layout, not just visibility — otherwise
   * Wrapper5 flex + gap:6 leaves an empty column for docs/story rows under folders.
   * Chevron lives in a sibling wrapper; it keeps normal flow.
   */
  .sidebar-container .sidebar-item
    :is(
      button,
      a[rel='canonical']:is(
        [href*='path=/story'],
        [href*='path=/docs'],
        [href*='path=/test']
      )
    )
    > div:first-child {
    position: relative;
  }

  .sidebar-container .sidebar-item
    :is(
      button,
      a[rel='canonical']:is(
        [href*='path=/story'],
        [href*='path=/docs'],
        [href*='path=/test']
      )
    )
    svg[viewBox='0 0 14 14'] {
    position: absolute !important;
    left: 0;
    top: 0;
    width: 0 !important;
    height: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
    border: 0 !important;
    overflow: hidden !important;
    opacity: 0 !important;
    pointer-events: none !important;
  }
</style>

<script>
  // --- Console noise filter (manager UI only) --------------------------------
  // The Storybook manager runtime currently logs a deprecation about `Button active`
  // as a console *error*. It's non-actionable for us (Storybook internal), so we
  // suppress only that exact message substring to keep DevTools usable.
  (function patchManagerConsoleOnce() {
    if (globalThis.__PLUS_STORYBOOK_MANAGER_CONSOLE_PATCHED__) return;
    globalThis.__PLUS_STORYBOOK_MANAGER_CONSOLE_PATCHED__ = true;

    const SUPPRESSED = 'The `active` prop on `Button` is deprecated and will be removed in Storybook 11.';

    const originalWarn = console.warn.bind(console);
    const originalError = console.error.bind(console);

    function shouldSuppress(args) {
      return args.some((a) => typeof a === 'string' && a.includes(SUPPRESSED));
    }

    console.warn = (...args) => {
      if (shouldSuppress(args)) return;
      originalWarn(...args);
    };

    console.error = (...args) => {
      if (shouldSuppress(args)) return;
      originalError(...args);
    };
  })();
</script>
