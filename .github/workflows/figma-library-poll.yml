name: Poll Figma Library

on:
  schedule:
    # Every 15 minutes during work hours (Mon-Fri, 9am-7pm UTC)
    - cron: '*/15 13-23 * * 1-5'
  workflow_dispatch:
    # Allow manual triggering
  repository_dispatch:
    types: [figma-library-publish]
    # Triggered by Slack Workflow Builder when Figma app posts a publish notification

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  poll-library:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Poll Figma for changes
        id: poll
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/poll-figma-library.js

      - name: Commit updated snapshot
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add scripts/figma-component-snapshot.json
          git diff --cached --quiet || git commit -m "chore: update Figma component snapshot [skip ci]"
          git push || true

      - name: Create GitHub Issue for component changes
        if: steps.poll.outputs.components_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changeSummary = JSON.parse('${{ steps.poll.outputs.change_summary }}');
            const names = [
              ...changeSummary.created,
              ...changeSummary.modified,
              ...changeSummary.deleted
            ].join(', ');

            let body = '';
            try {
              body = fs.readFileSync('.figma-sync-context/issue-body.md', 'utf8');
            } catch {
              body = `Figma component changes detected: ${names}`;
            }

            // Check for existing open issue to avoid duplicates
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'figma-sync'
            });

            const alreadyExists = existingIssues.data.some(
              issue => issue.title.includes('Figma DS update')
            );

            if (!alreadyExists) {
              const reviewChecklist = [
                '',
                '---',
                '## Review Workflow',
                '',
                '### How to implement',
                '1. Create a branch: `git checkout -b ds-review/' + names.split(',')[0].trim().toLowerCase().replace(/\s+/g, '-') + '`',
                '2. Implement the changes (manually or via `@codex` / `@claude` in #figma-sync)',
                '3. Open a PR to `main` and request review from DS managers',
                '4. DS managers review and approve before merge',
                '',
                '### Checklist',
                '- [ ] Component code updated to match Figma',
                '- [ ] Storybook stories updated',
                '- [ ] Visual parity verified against Figma',
                '- [ ] No regressions in existing components',
                '- [ ] DS manager approved',
              ].join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `feat: Figma DS update — ${names}`,
                body: body + reviewChecklist,
                labels: ['design-system', 'figma-sync'],
                assignees: []
              });
              console.log('Issue created with review checklist');
            } else {
              console.log('Open figma-sync issue already exists — skipping');
            }

