name: Poll Figma Library

on:
  schedule:
    # Every 15 minutes during work hours (Mon-Fri, 9am-7pm UTC)
    - cron: '*/15 13-23 * * 1-5'
  workflow_dispatch:
    # Allow manual triggering
  repository_dispatch:
    types: [figma-library-publish]
    # Triggered by Slack Workflow Builder when Figma app posts a publish notification

permissions:
  contents: write

jobs:
  poll-library:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Poll Figma for changes
        id: poll
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node scripts/poll-figma-library.js

      - name: Commit updated snapshot
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add scripts/figma-component-snapshot.json
          git diff --cached --quiet || git commit -m "chore: update Figma component snapshot [skip ci]"
          git push || true


