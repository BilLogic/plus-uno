#   plus-admin C089A3E9CCW · plus-design-feedback C074QG2V7DJ ·
#   plus-marketing C052BG9NE86 · plus-training C07L5RZV6DR ·
#   plus-universal C072E8SFLKV
SLACK_SEARCH_PRIVATE_ALLOWLIST = "C03DVDS4LN9,C07PZJD3HD5,C09EPEJEQ9K,C07LU2K8DQW,C089A3E9CCW,C074QG2V7DJ,C052BG9NE86,C07L5RZV6DR,C072E8SFLKV"
# ── Model provider adapter ────────────────────────────────────────────────────
# MODEL_PROVIDER: "gemini" | "vertex-claude". Flipping this var IS the switch —
# runAgent dispatches the whole turn to the matching loop (src/agent/run-agent.ts).
#   gemini        → src/agent/gemini-agent.ts (local tools + googleSearch/
#                   urlContext; the production default).
#   vertex-claude → src/agent/claude-agent.ts (Claude via Vertex AI on the SAME
#                   GCP service account as Gemini; billed to the GCP project;
#                   local tools + Claude web_search). Requires the Vertex-Claude
#                   models enabled in the project's Model Garden. Smoke-test with
#                   GET /debug/vertex-claude before flipping.
MODEL_PROVIDER = "gemini"
# Vertex service-account path (project the SA belongs to; region "global").
# Shared by BOTH the Gemini-Vertex and the Vertex-Claude lanes.
GEMINI_PROJECT_ID = "hcii-plus"
GEMINI_REGION = "global"
# Active Gemini model. A/B trial verdict (2026-07-10): gemini-3.1-flash-lite
# fabricated grounding on multi-source answers — disqualifying for a
# grounding-first bot. gemini-3.6-flash is the intended default (succeeded
# 3.5-flash 2026-07-21 — better coding/agentic loops, ~17% fewer output tokens).
# (2026-07-16 quota incident: flash quota exhausted → bridged on gemini-2.5-pro
# for the afternoon; reverted same day once flash had headroom again. The
# lesson is now code: GEMINI_FALLBACK_MODEL below fails over automatically.)
GEMINI_MODEL = "gemini-3.6-flash"
# Backup model — a turn that hits a capacity/availability error (404/429/500/
# 503) on GEMINI_MODEL retries once on this model and finishes there, instead
# of dying like the 2026-07-16 outage. Pick one with a SEPARATE quota pool from
# the active model (pro vs flash); degraded-but-answering beats down.
GEMINI_FALLBACK_MODEL = "gemini-2.5-pro"
# Vertex-Claude sonnet-lane model id (only read when MODEL_PROVIDER=vertex-claude;
# haiku/opus tiers are fixed in src/agent/routing.ts). Optional — defaults to
# "claude-sonnet-5".
CLAUDE_MODEL = "claude-sonnet-5"

# Secrets are set via `wrangler secret put`. Expected names:
#   SLACK_SIGNING_SECRET     (verify incoming Slack request signatures)
#   SLACK_BOT_TOKEN          (xoxb-… — chat.postMessage / reactions.add / replies)
#   SLACK_MCP_CLIENT_SECRET  (secret for the static Slack OAuth client whose
#                             id is SLACK_MCP_CLIENT_ID above; powers slack_search)
#   GITHUB_TOKEN             (PAT with repo:dispatch scope + Contents:Read)
#   FIGMA_ACCESS_TOKEN       (Figma read PAT — the prototype_scaffold proposal
#                             screenshot fetch in events.ts + the library poll's
#                             component/version reads in figma-poll.ts)
#   NOTION_API_KEY           (Notion internal integration token — notion_create/
#                             update/archive + the notion_search catalog reads)
#   GMAIL_SENDER             (authorized "From" mailbox for email_send)
#   GMAIL_CLIENT_ID / GMAIL_CLIENT_SECRET / GMAIL_REFRESH_TOKEN  (Gmail OAuth)
#   SUPABASE_ANON_KEY        (publishable/anon read key; blueprint_search read-only)
#   GEMINI_SA_EMAIL          (Vertex service-account client_email — powers BOTH
#                             the Gemini-Vertex and Vertex-Claude lanes)
#   GEMINI_SA_PRIVATE_KEY    (Vertex service-account private_key — full PEM)
#   GEMINI_API_KEY           (AI Studio key — DO NOT SET on the Worker. Rule
#                             2026-07-16 / ADR-018: the Vertex SA is canonical and
#                             takes precedence whenever fully set; the AI Studio
#                             key is a local-dev emergency fallback for the Gemini
#                             lane only and CANNOT reach Claude.)
#   DEBUG_TOKEN              (gates the /debug/* routes; sent as x-debug-token)

# Durable Object — per-thread conversation state + pending tool-call proposals.
[[durable_objects.bindings]]
name = "THREAD_STATE"
class_name = "ThreadState"

# Durable Object — per-thread agent-run executor. Its alarm() runs the message
# pipeline OUTSIDE ctx.waitUntil(), whose 30s post-ack cancellation silently
# killed longer agent runs (👀-then-silence incident, 2026-07-09).
[[durable_objects.bindings]]
name = "AGENT_RUNNER"
class_name = "AgentRunner"

# SQLite-backed Durable Object — works on Workers Free plan.
# (new_classes is the legacy KV-backed migration that requires Workers Paid.)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ThreadState"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["AgentRunner"]

# KV — Slack login: stores the issued user (xoxp) token that slack_search uses
# (and PKCE verifiers during the one-time OAuth consent).
[[kv_namespaces]]
binding = "SLACK_OAUTH_KV"
id = "18b58372d9bc430489d634c2c9a0b0c4"

# KV — harness resilience: last-known-good system-prompt assembly + alert
# throttle. (The harness is baked into the bundle; this is the fallback/alert
# path — see src/agent/skills.ts.) Also hosts the Figma poll's component
# snapshot under "figma-poll:*" (src/figma-poll.ts) — one ~400KB value didn't
# warrant a namespace of its own.
[[kv_namespaces]]
binding = "HARNESS_KV"
id = "10e5f980215e4f7e817bf55ac69dda43"
