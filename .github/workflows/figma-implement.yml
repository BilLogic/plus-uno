name: Implement Figma Changes

on:
  repository_dispatch:
    types: [implement-figma-changes]
    # Triggered from Slack via Pipedream
    # client_payload: { component: "Badge", thread_ts: "...", notion_prd_id: "...", notion_prd_url: "..." }
  workflow_dispatch:
    inputs:
      component:
        description: 'Component name (e.g., Badge, Button)'
        required: true
        type: string
      notion_prd_id:
        description: 'Notion PRD page ID (optional)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  implement:
    runs-on: ubuntu-latest

    steps:
      - name: Parse inputs
        id: payload
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "component=${{ github.event.inputs.component }}" >> $GITHUB_OUTPUT
            echo "notion_prd_id=${{ github.event.inputs.notion_prd_id }}" >> $GITHUB_OUTPUT
            echo "notion_prd_url=" >> $GITHUB_OUTPUT
          else
            echo "component=${{ github.event.client_payload.component }}" >> $GITHUB_OUTPUT
            echo "notion_prd_id=${{ github.event.client_payload.notion_prd_id }}" >> $GITHUB_OUTPUT
            echo "notion_prd_url=${{ github.event.client_payload.notion_prd_url }}" >> $GITHUB_OUTPUT
            echo "thread_ts=${{ github.event.client_payload.thread_ts }}" >> $GITHUB_OUTPUT
            echo "channel=${{ github.event.client_payload.channel }}" >> $GITHUB_OUTPUT
            echo "message_ts=${{ github.event.client_payload.message_ts }}" >> $GITHUB_OUTPUT
          fi

      - name: React to Slack message (working)
        if: steps.payload.outputs.channel && steps.payload.outputs.message_ts
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          # Add gear reaction to show we're working on it
          curl -s -X POST "https://slack.com/api/reactions.add" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"${{ steps.payload.outputs.channel }}\", \"name\": \"gear\", \"timestamp\": \"${{ steps.payload.outputs.message_ts }}\"}" || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create implementation branch
        id: branch
        run: |
          COMPONENT="${{ steps.payload.outputs.component }}"
          SLUG=$(echo "$COMPONENT" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]\+/-/g' | sed 's/^-\|-$//g')
          DATE=$(date +%Y-%m-%d)
          TIMESTAMP=$(date +%H%M%S)
          BRANCH="ds-review/${SLUG}-${DATE}-${TIMESTAMP}"
          git checkout -b "$BRANCH"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action (Claude)"
          # Create placeholder so branch differs from main
          mkdir -p .figma-sync-context
          echo "# Implementation: $COMPONENT ($(date -u +%Y-%m-%dT%H:%M:%SZ))" > .figma-sync-context/implement-placeholder.md
          git add -A
          git diff --cached --quiet || git commit -m "chore: start implementation for $COMPONENT"
          git push -u origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Implement changes with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PRD_ID: ${{ steps.payload.outputs.notion_prd_id }}
          PR_TITLE: "feat: Figma DS update — ${{ steps.payload.outputs.component }}"
        run: node scripts/implement-figma-changes.js

      - name: Commit and push changes
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action (Claude)"
          git add -A
          if git diff --cached --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "feat: implement Figma design changes via Claude"
            git push
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create draft PR
        if: steps.commit.outputs.changes == 'true'
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const component = '${{ steps.payload.outputs.component }}';
            const branch = '${{ steps.branch.outputs.branch }}';
            const prdUrl = '${{ steps.payload.outputs.notion_prd_url }}';

            const body = [
              `## Figma DS Update: ${component}`,
              '',
              prdUrl ? `**Notion PRD:** ${prdUrl}` : '',
              `**Figma:** https://www.figma.com/design/${{ secrets.FIGMA_FILE_KEY }}`,
              '',
              '---',
              '## DS Review Checklist',
              '',
              '- [ ] Component code updated to match Figma',
              '- [ ] Storybook stories updated',
              '- [ ] Visual parity verified against Figma',
              '- [ ] No regressions in existing components',
              '- [ ] DS manager approved',
            ].filter(Boolean).join('\n');

            // Don't let a PR-create failure crash the job — the branch + code have
            // already succeeded and been pushed. Capture the error so the Slack
            // notify step can report exactly what failed (e.g. the org policy
            // "Actions is not permitted to create or approve pull requests") while
            // still crediting what worked, and pointing to a manual-PR recovery.
            try {
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `feat: Figma DS update — ${component}`,
                head: branch,
                base: 'main',
                body,
                draft: true
              });
              console.log(`Draft PR created: #${pr.data.number}`);
              core.setOutput('pr_created', 'true');
              core.setOutput('pr_number', pr.data.number);
              core.setOutput('pr_url', pr.data.html_url);

              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.data.number,
                  labels: ['design-system', 'figma-sync']
                });
              } catch (e) {
                core.warning('Could not add labels: ' + (e.message || e));
              }
            } catch (err) {
              core.setOutput('pr_created', 'false');
              core.setOutput('pr_error', err.message || String(err));
              core.warning('PR creation failed: ' + (err.message || err));
            }

      - name: Update Notion PRD status
        if: steps.create-pr.outputs.pr_created == 'true'
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PRD_ID: ${{ steps.payload.outputs.notion_prd_id }}
        run: |
          if [ -n "$NOTION_PRD_ID" ]; then
            # Update to "In Review" now that a PR exists
            curl -s -X PATCH "https://api.notion.com/v1/pages/${NOTION_PRD_ID}" \
              -H "Authorization: Bearer ${NOTION_API_KEY}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d '{"properties": {"Status": {"select": {"name": "In Review"}}}}' || true
            echo "   ✅ Notion PRD status → In Review"
          fi

      - name: React to Slack message (result)
        if: always() && steps.payload.outputs.channel && steps.payload.outputs.message_ts
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          HAS_CHANGES: ${{ steps.commit.outputs.changes }}
          PR_CREATED: ${{ steps.create-pr.outputs.pr_created }}
          CHANNEL: ${{ steps.payload.outputs.channel }}
          MESSAGE_TS: ${{ steps.payload.outputs.message_ts }}
        run: |
          # Remove gear reaction
          curl -s -X POST "https://slack.com/api/reactions.remove" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"$CHANNEL\", \"name\": \"gear\", \"timestamp\": \"$MESSAGE_TS\"}" || true

          # Result reaction: success (code + PR), warning (code but no PR),
          # info (nothing to change), or x (the run crashed before committing).
          if [ "$JOB_STATUS" = "failure" ]; then
            EMOJI="x"
          elif [ "$HAS_CHANGES" = "true" ] && [ "$PR_CREATED" = "true" ]; then
            EMOJI="white_check_mark"
          elif [ "$HAS_CHANGES" = "true" ]; then
            EMOJI="warning"
          else
            EMOJI="information_source"
          fi

          curl -s -X POST "https://slack.com/api/reactions.add" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"$CHANNEL\", \"name\": \"$EMOJI\", \"timestamp\": \"$MESSAGE_TS\"}" || true

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          COMPONENT: ${{ steps.payload.outputs.component }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          HAS_CHANGES: ${{ steps.commit.outputs.changes }}
          PR_CREATED: ${{ steps.create-pr.outputs.pr_created }}
          PR_URL: ${{ steps.create-pr.outputs.pr_url }}
          PR_ERROR: ${{ steps.create-pr.outputs.pr_error }}
          THREAD_TS: ${{ steps.payload.outputs.thread_ts }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Report each phase honestly. Values come in via env (not inline ${{ }})
          # so an error message with quotes/newlines can't break the shell, and jq
          # builds the JSON so it's always correctly escaped.
          if [ "$JOB_STATUS" = "failure" ]; then
            MSG=":x: *Implement ${COMPONENT} failed*\n"
            if [ -n "$BRANCH" ]; then
              MSG="${MSG}• :white_check_mark: Branch \`${BRANCH}\` created\n"
            fi
            MSG="${MSG}• :x: The run failed before changes were committed — most likely code generation.\n<${RUN_URL}|Open the run log to see the error>"
          elif [ "$HAS_CHANGES" = "true" ] && [ "$PR_CREATED" = "true" ]; then
            MSG=":white_check_mark: *Implemented ${COMPONENT}*\n• Branch \`${BRANCH}\` pushed\n• Code generated by Claude\n• Draft PR opened: <${PR_URL}|review the PR>\n\nPlease review the diff and verify visual parity with Figma."
          elif [ "$HAS_CHANGES" = "true" ]; then
            MSG=":warning: *Implemented ${COMPONENT} — but the PR could not be opened*\n• :white_check_mark: Branch \`${BRANCH}\` pushed\n• :white_check_mark: Code generated by Claude (committed to the branch)\n• :x: Draft PR failed: ${PR_ERROR}\n\n_Recover: open a PR from \`${BRANCH}\` in GitHub, or fix the setting (Settings → Actions → General → \"Allow GitHub Actions to create and approve pull requests\"). <${RUN_URL}|Run log>_"
          else
            MSG=":information_source: *Analyzed ${COMPONENT}* — no code changes needed (already matches Figma).\n<${RUN_URL}|View the run log>"
          fi

          # Convert the \n escapes to real newlines, then let jq encode safely.
          MSG="$(printf '%b' "$MSG")"
          if [ -n "$THREAD_TS" ]; then
            PAYLOAD="$(jq -n --arg text "$MSG" --arg thread "$THREAD_TS" '{text: $text, thread_ts: $thread}')"
          else
            PAYLOAD="$(jq -n --arg text "$MSG" '{text: $text}')"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD" || true
