<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Badge Smart Debug</title>

    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600;700&family=Merriweather+Sans:wght@300;400;600;700&family=Open+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <!-- Load Font Awesome 6 Free -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Load PLUS Design System CSS -->
    <link rel="stylesheet" href="../dist/css/main.css">

    <style>
        body {
            padding: 20px;
            font-family: var(--font-family-body);
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .label {
            width: 50px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <h1>Static Badge Smart Debug</h1>

    <div id="container" class="container"></div>

    <script type="module">
        import { createStaticBadgeSmart } from '../design-system/components/StaticBadgeSmart/index.js';

        const container = document.getElementById('container');
        const sizes = ['h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'b1', 'b2', 'b3'];
        const type = 'socio-emotional';

        sizes.forEach(size => {
            const row = document.createElement('div');
            row.className = 'row';

            const label = document.createElement('span');
            label.className = 'label';
            label.textContent = size.toUpperCase();

            const badge = createStaticBadgeSmart({
                type: type,
                size: size
            });

            row.appendChild(label);
            row.appendChild(badge);
            container.appendChild(row);
        });
    </script>
</body>

</html>
