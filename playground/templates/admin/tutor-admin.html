<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Admin - PLUS Design System</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600;700&family=Merriweather+Sans:wght@300;400;600;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 4 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css">
    
    <!-- PLUS Design System CSS -->
    <link rel="stylesheet" href="../../dist/css/main.css">
    
    <style>
        /* Tutor Admin Page Styles */
        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-surface);
            color: var(--color-on-surface);
            font-family: var(--font-family-body);
        }
        
        /* Layout Container */
        .tutor-admin-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar Navigation - Surface Container */
        .tutor-admin-sidebar {
            width: 280px;
            background-color: var(--color-surface-container-high);
            border-right: var(--size-surface-container-border) solid var(--color-outline);
            padding: var(--size-surface-container-pad-y-md) var(--size-surface-container-pad-x-md);
            display: flex;
            flex-direction: column;
            gap: var(--size-surface-container-gap-md);
        }
        
        .sidebar-logo {
            margin-bottom: var(--size-section-gap-md);
        }
        
        .sidebar-logo-text {
            font-family: var(--font-family-header);
            font-weight: var(--font-weight-bold);
            font-size: var(--font-size-h4);
            color: var(--color-primary);
        }
        
        .sidebar-section {
            margin-bottom: var(--size-section-gap-md);
        }
        
        .sidebar-section-title {
            font-family: var(--font-family-header);
            font-weight: var(--font-weight-semibold-2);
            font-size: var(--font-size-body2);
            color: var(--color-on-surface-variant);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--size-element-gap-sm);
            padding: 0 var(--size-element-pad-x-sm);
        }
        
        /* Main Content Area - Surface */
        .tutor-admin-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--color-surface);
        }
        
        /* Header - Surface Container */
        .tutor-admin-header {
            background-color: var(--color-surface-container);
            border-bottom: var(--size-element-border) solid var(--color-outline-variant);
            padding: var(--size-surface-container-pad-y-sm) var(--size-surface-pad-x);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--size-element-gap-md);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: var(--size-element-gap-md);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: var(--size-element-gap-md);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: var(--size-element-gap-sm);
        }
        
        .user-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--color-primary-container);
            color: var(--color-on-primary-container);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-size-body1);
            font-weight: var(--font-weight-semibold-2);
        }
        
        /* Content Area */
        .tutor-admin-content {
            flex: 1;
            padding: var(--size-surface-pad-y) var(--size-surface-pad-x);
            overflow-y: auto;
        }
        
        /* Tabs */
        .tutor-tabs {
            display: flex;
            gap: var(--size-element-gap-sm);
            margin-bottom: var(--size-section-gap-md);
            border-bottom: var(--size-element-border) solid var(--color-outline-variant);
        }
        
        .tutor-tab {
            padding: var(--size-element-pad-y-md) var(--size-element-pad-x-md);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--color-on-surface-variant);
            font-family: var(--font-family-header);
            font-size: var(--font-size-body1);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: var(--size-element-gap-sm);
            transition: all 0.2s;
        }
        
        .tutor-tab:hover {
            color: var(--color-primary);
            background-color: var(--color-primary-state-08);
        }
        
        .tutor-tab.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: var(--size-element-gap-md);
            margin-bottom: var(--size-section-gap-md);
            flex-wrap: wrap;
        }
        
        /* Table */
        .tutor-table-container {
            background-color: var(--color-surface-container);
            border-radius: var(--size-card-radius-sm);
            border: var(--size-card-border-sm) solid var(--color-outline-variant);
            overflow: hidden;
        }
        
        .tutor-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .tutor-table thead {
            background-color: var(--color-surface-container-low);
        }
        
        .tutor-table th {
            padding: var(--size-table-cell-y) var(--size-table-cell-x);
            text-align: left;
            font-family: var(--font-family-header);
            font-weight: var(--font-weight-semibold-2);
            font-size: var(--font-size-body2);
            color: var(--color-on-surface-variant);
            border-bottom: var(--size-element-border) solid var(--color-outline-variant);
        }
        
        .tutor-table th.sortable {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: var(--size-element-gap-xs);
        }
        
        .tutor-table th.sortable:hover {
            color: var(--color-primary);
        }
        
        .tutor-table td {
            padding: var(--size-table-cell-y) var(--size-table-cell-x);
            border-bottom: var(--size-element-border) solid var(--color-outline-variant);
            font-size: var(--font-size-body1);
            color: var(--color-on-surface);
        }
        
        .tutor-table tbody tr:hover {
            background-color: var(--color-primary-state-08);
        }
        
        .tutor-table tbody tr:last-child td {
            border-bottom: none;
        }
        
        .tutor-name-cell {
            display: flex;
            align-items: center;
            gap: var(--size-element-gap-sm);
        }
        
        .tutor-email {
            font-size: var(--font-size-body2);
            color: var(--color-on-surface-variant);
        }
        
        .tutor-actions {
            display: flex;
            gap: var(--size-element-gap-md);
        }
        
        .tutor-action-link {
            color: var(--color-primary);
            text-decoration: none;
            font-size: var(--font-size-body1);
            cursor: pointer;
        }
        
        .tutor-action-link:hover {
            text-decoration: underline;
        }
        
        /* Footer */
        .tutor-admin-footer {
            background-color: var(--color-surface-container);
            border-top: var(--size-element-border) solid var(--color-outline-variant);
            padding: var(--size-section-pad-y-sm) var(--size-surface-pad-x);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: var(--font-size-body2);
            color: var(--color-on-surface-variant);
        }
        
        /* Collapse button */
        .collapse-sidebar-btn {
            background: none;
            border: none;
            color: var(--color-on-surface);
            cursor: pointer;
            padding: var(--size-element-pad-y-sm) var(--size-element-pad-x-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .collapse-sidebar-btn:hover {
            background-color: var(--color-primary-state-08);
            border-radius: var(--size-element-radius-sm);
        }
        
        /* Bulk Actions Toolbar */
        #bulk-actions-toolbar {
            display: none;
        }
        
        /* Modal Backdrop */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--color-scrim);
            z-index: 1040;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Form inputs */
        .plus-text-field,
        .plus-textarea,
        .plus-select {
            width: 100%;
            padding: var(--size-element-pad-y-md) var(--size-element-pad-x-md);
            border: var(--size-element-border) solid var(--color-outline);
            border-radius: var(--size-element-radius-sm);
            background-color: var(--color-surface);
            color: var(--color-on-surface);
            font-family: var(--font-family-body);
            font-size: var(--font-size-body2);
        }
        
        .plus-text-field:focus,
        .plus-textarea:focus,
        .plus-select:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        
        .plus-textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        /* Checkbox styling in table */
        .tutor-table .plus-checkbox-wrapper {
            padding-left: 0;
            margin: 0;
        }
        
        .tutor-table .form-check-input {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="tutor-admin-container">
        <!-- Sidebar Navigation -->
        <aside class="tutor-admin-sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-text">PLUS Personalized Learning</div>
            </div>
            <nav id="sidebar-nav"></nav>
        </aside>
        
        <!-- Main Content -->
        <main class="tutor-admin-main">
            <!-- Header -->
            <header class="tutor-admin-header">
                <div class="header-left">
                    <button class="collapse-sidebar-btn" id="collapse-btn" aria-label="Collapse sidebar">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <nav id="breadcrumb-nav"></nav>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div class="user-icon">A</div>
                        <span class="body1-txt">A Albus Dumbl...</span>
                    </div>
                </div>
            </header>
            
            <!-- Content Area -->
            <div class="tutor-admin-content">
                <!-- Tabs -->
                <div class="tutor-tabs" id="tutor-tabs"></div>
                
                <!-- Action Buttons -->
                <div class="action-buttons" id="action-buttons"></div>
                
                <!-- Tutor Table -->
                <div class="tutor-table-container">
                    <table class="tutor-table" id="tutor-table">
                        <thead>
                            <tr>
                                <!-- Checkbox column header will be added by JavaScript -->
                                <th class="sortable" data-sort="name">
                                    Name <i class="fas fa-arrow-up"></i>
                                </th>
                                <th class="sortable" data-sort="groups">
                                    Groups <i class="fas fa-arrow-up"></i>
                                </th>
                                <th class="sortable" data-sort="students">
                                    Students <i class="fas fa-arrow-up"></i>
                                </th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="tutor-table-body">
                            <!-- Table rows will be generated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Footer -->
            <footer class="tutor-admin-footer">
                <div>v9.3.0</div>
                <div>Copyright © Carnegie Mellon University 2025</div>
                <div>
                    <a href="#" class="tutor-action-link">Terms of Use</a>
                </div>
            </footer>
        </main>
    </div>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Bootstrap 4 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- PLUS Components -->
    <script type="module" src="tutor-admin.js"></script>
</body>
</html>
