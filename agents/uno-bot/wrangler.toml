name = "uno-bot"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Workers Logs / Observability. This block MUST stay in the file: it was first
# enabled from the dashboard mid-incident (2026-07-09), and the next CI deploy
# silently reverted it — wrangler treats a missing block as "disabled".
[observability]
enabled = true
head_sampling_rate = 1

# Figma library poll (src/figma-poll.ts) — every 15 min during work hours
# (Mon–Fri, 13:00–23:45 UTC = 9am–7:45pm ET), the SAME cadence the retired
# figma-library-poll.yml GitHub Action ran on before it was removed (2026-07-09,
# PR #38). Detects DS publishes, files a PRD, posts the update card to #uno-bot.
# Scheduled invocations get a fresh subrequest budget + a 15-min wall clock, so
# the poll never competes with an agent turn. Manual firing: GET /debug/figma-poll.
[triggers]
crons = ["*/15 13-23 * * 1-5"]

# ── FREE-TIER CONSTRAINTS (deliberate — the team keeps the Worker on the free
# plan; design within these, don't fight them) ────────────────────────────────
#   • 50 subrequests per invocation. One agent turn spends most of it (Slack +
#     DO hops + grounding tool calls + model API), which is why the AgentRunner
#     processes exactly ONE job per alarm firing (fresh budget each firing) and
#     the loop enforces a weighted subrequest budget (agent/loop-shared.ts).
#     NOTE: the harness (persona + skills) is baked into the Worker BUNDLE at
#     build time (src/generated/harness.ts, via `npm run bundle:harness`), so
#     serving it costs ZERO subrequests — it updates on DEPLOY, not on a push to
#     main. (This replaced an older runtime GitHub-Raw fetch that cost ~20.)
#   • ~10ms CPU/request soft budget — agent work is I/O-bound, but keep
#     CPU-heavy paths (base64 of images) modest.
#   • Workers Logs: 200K events/day, then sampling.
#   • ctx.waitUntil() work is cancelled ~30s after the response — anything
#     longer runs in the AgentRunner Durable Object alarm instead.

# Plain vars (non-secret). Override per-env below.
